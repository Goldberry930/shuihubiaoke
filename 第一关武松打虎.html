<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>武松打虎 · 第一关</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#1a0e03;
  font-family:'Noto Serif SC','STSong','宋体',serif;
  display:flex;align-items:center;justify-content:center;
}

#wrap{
  position:relative;
  width:390px;height:844px;
  border-radius:12px;overflow:hidden;
  box-shadow:0 0 60px rgba(0,0,0,.8),0 0 120px rgba(180,100,0,.2);
}

/* 游戏画布 */
#gc{display:block;width:390px;height:844px}

/* ── 卷轴边框 ── */
#scroll-top,#scroll-bottom{
  position:absolute;left:0;right:0;height:28px;
  background:linear-gradient(180deg,#6a3c0a,#9a5a18 40%,#7a4210 70%,#4a2408);
  z-index:20;pointer-events:none;
  box-shadow:0 4px 12px rgba(0,0,0,.5);
}
#scroll-top{top:0;border-radius:12px 12px 0 0}
#scroll-bottom{bottom:0;border-radius:0 0 12px 12px;box-shadow:0 -4px 12px rgba(0,0,0,.5)}
/* 卷轴纹理 */
#scroll-top::before,#scroll-bottom::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,rgba(255,180,60,.08) 0,transparent 6px,transparent 20px);
  border-radius:inherit;
}
/* 卷轴端头圆柱 */
#scroll-top::after,#scroll-bottom::after{
  content:'';position:absolute;
  left:8px;right:8px;
  height:100%;
  background:linear-gradient(90deg,#5a2c08 0%,#c8802a 15%,#f0b050 40%,#c88028 60%,#9a5c18 80%,#5a2c08 100%);
  border-radius:14px;
  box-shadow:inset 0 2px 4px rgba(255,220,100,.3),inset 0 -2px 4px rgba(0,0,0,.4);
}

/* ── Overlay ── */
#overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,4,0,.82);
  backdrop-filter:blur(4px);
  z-index:30;transition:opacity .3s;
}
#overlay.hidden{opacity:0;pointer-events:none}
.ov-title{
  font-size:36px;font-weight:900;
  color:#f5c842;letter-spacing:4px;
  text-shadow:0 0 20px rgba(245,200,66,.6),2px 2px 0 rgba(80,40,0,.9);
  margin-bottom:6px;
}
.ov-sub{
  font-size:15px;color:rgba(220,185,100,.7);
  letter-spacing:6px;margin-bottom:28px;
}
.ov-score{
  font-size:22px;color:#f5c842;
  letter-spacing:2px;margin:5px 0;
  text-shadow:0 0 10px rgba(245,200,66,.5);
}
.ov-hint{
  font-size:14px;color:rgba(200,170,90,.55);
  letter-spacing:2px;margin-top:20px;
  animation:blink 1.3s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ── HUD ── */
#hud{
  position:absolute;top:30px;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 20px;z-index:10;pointer-events:none;
}
.hud-score{
  font-size:18px;font-weight:900;color:#f5c842;
  letter-spacing:2px;
  text-shadow:0 0 10px rgba(245,200,66,.6),1px 1px 0 rgba(60,25,0,.9);
}
.hud-hi{font-size:12px;color:rgba(200,160,60,.6);letter-spacing:2px}
.hud-right{text-align:right}

/* ── 血量条 ── */
#hp-wrap{
  position:absolute;top:32px;left:50%;transform:translateX(-50%);
  z-index:10;display:flex;align-items:center;gap:8px;pointer-events:none;
}
.hp-icon{font-size:14px}
#hp-bar-bg{
  width:120px;height:10px;
  background:rgba(0,0,0,.4);border-radius:5px;
  border:1px solid rgba(255,200,60,.3);
  overflow:hidden;
}
#hp-bar{
  height:100%;width:100%;
  background:linear-gradient(90deg,#ff4422,#ff8844);
  border-radius:5px;transition:width .3s ease;
}

/* ── 技能按钮（移动端） ── */
#mobile-btns{
  position:absolute;bottom:50px;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 28px;z-index:10;
}
.mob-btn{
  width:64px;height:64px;border-radius:50%;
  background:rgba(245,200,66,.18);
  border:2px solid rgba(245,200,66,.4);
  color:#f5c842;font-size:10px;font-family:inherit;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  backdrop-filter:blur(4px);
  transition:background .15s;
  letter-spacing:0;
}
.mob-btn:active{background:rgba(245,200,66,.38)}
.mob-btn .btn-icon{font-size:22px;line-height:1}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc" width="390" height="844"></canvas>

  <!-- 卷轴边框 -->
  <div id="scroll-top"></div>
  <div id="scroll-bottom"></div>

  <!-- 返回按钮 -->
  <button id="back-btn" onclick="goBack()" style="position:absolute;top:32px;left:16px;z-index:25;background:rgba(0,0,0,.45);border:1px solid rgba(255,200,66,.35);border-radius:20px;color:rgba(245,200,66,.85);font-size:12px;font-family:inherit;padding:6px 14px;cursor:pointer;letter-spacing:1px;backdrop-filter:blur(4px)">← 返回</button>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-left">
      <div class="hud-score" id="score-disp">00000</div>
      <div class="hud-hi" id="hi-disp"></div>
      <div id="target-disp" style="font-size:11px;color:rgba(245,200,66,.5);letter-spacing:1px;margin-top:2px"></div>
    </div>
    <div class="hud-right">
      <div class="hud-score" id="dist-disp">距离 0m</div>
    </div>
  </div>

  <!-- HP -->
  <div id="hp-wrap">
    <span class="hp-icon">🦷</span>
    <div id="hp-bar-bg"><div id="hp-bar"></div></div>
    <span class="hp-icon">🦷</span>
  </div>

  <!-- Overlay -->
  <div id="overlay">
    <div class="ov-title" id="ov-title">武松打虎</div>
    <div class="ov-sub" id="ov-sub">第 一 关</div>
    <div class="ov-hint">按 空格 / 点击 开始</div>
  </div>

  <!-- 移动端按钮 -->
  <div id="mobile-btns">
    <button class="mob-btn" id="btn-duck" onpointerdown="mobileAction('duck',true)" onpointerup="mobileAction('duck',false)">
      <span class="btn-icon">⬇</span><span>蹲</span>
    </button>
    <button class="mob-btn" id="btn-jump" onclick="mobileAction('jump')">
      <span class="btn-icon">⬆</span><span>跳</span>
    </button>
  </div>
</div>

<script>
/* ── 缩放适配 ── */
(function(){
  const wrap=document.getElementById('wrap');
  function resize(){
    const s=Math.min(window.innerWidth/390,window.innerHeight/844);
    wrap.style.transform=`scale(${s})`;
    wrap.style.transformOrigin='center center';
  }
  resize();window.addEventListener('resize',resize);
})();

/* ── 预加载图片 ── */
function loadImg(src){
  return new Promise(res=>{
    const i=new Image();
    i.onload=()=>res(i);
    i.src=src;
  });
}

  1: 1.0,
  2: 1.0,
  3: 1.0,
};

const LEVEL_NAMES = {
  1: { tiger: '吴用', wusong: '杨志' },
  2: { tiger: '老虎', wusong: '武松' },
  3: { tiger: '高俅', wusong: '林冲' },
};
const LEVEL_WUSONG_NAME_OX = { 1:0, 2:10, 3:-15 };

/* ── 每关武松起始位置（越小越早出现） ── */
const LEVEL_WUSONG_START = {
  1: 572,  // 提前约6秒
  2: 680,
  3: 680,
};

/* ── 配置 ── */
const CFG = {
  W:390, H:844,
  GROUND: 700,      // 地面y
  GRAVITY: 0.50,
  JUMP_F: -16,
  JUMP_F2: -10,     // 二段跳
  SPEED0: 2.4,
  MAX_SPEED: 6.8,
  SPD_INC: 0.0009,
  HP_MAX: 5,
};

/* ── 难度（由intro通过localStorage传入关卡编号） ── */
(function applyDifficulty(){
  const lv = parseInt(localStorage.getItem('shuihu_level')||'1');
  localStorage.removeItem('shuihu_level');
  const D = {
    1:{s0:2.0, sm:4.0, si:0.0004, win:500},
    2:{s0:2.2, sm:4.8, si:0.0005, win:800},
    3:{s0:2.4, sm:5.5, si:0.0006, win:950},
  }[lv] || {s0:2.4, sm:4.8, si:0.0005, win:800};
  CFG.SPEED0    = D.s0;
  CFG.MAX_SPEED = D.sm;
  CFG.SPD_INC   = D.si;
  CFG._WIN      = D.win;
  CFG._LEVEL    = lv;
})();

/* ── 关卡名称 ── */
const LEVEL_INFO = {
  1:{title:'智取生辰纲',sub:'第 一 关'},
  2:{title:'武松打虎',sub:'第 二 关'},
  3:{title:'误入白虎堂',sub:'第 三 关'},
};
(function initOverlay(){
  const li=LEVEL_INFO[CFG._LEVEL]||LEVEL_INFO[1];
  document.getElementById('ov-title').textContent=li.title;
  document.getElementById('ov-sub').textContent=li.sub;
  document.getElementById('target-disp').textContent='目标 '+CFG._WIN+' 分';
})();

/* ── 游戏状态 ── */
let imgs={}, state='idle', speed=CFG.SPEED0, score=0, hiScore=0;
let distance=0, frameN=0, animT=0, animF=0, hp=CFG.HP_MAX;
let invincible=0; // 无敌帧计数
let winTriggered=false;

/* ── 主角 ── */
const player = {
  x:80, y:CFG.GROUND, w:56, h:100,
  vy:0, grounded:true, jumping:false, jumps:0,
  ducking:false, dead:false,
  hitTimer:0,
};

/* ── 障碍物 ── */
let obstacles=[], nextObsTimer=0;

/* ── 背景 ── */
let bgLayers=[]; // 视差背景
let groundPebbles=[];
for(let i=0;i<60;i++) groundPebbles.push({x:i*16+Math.random()*8, w:2+Math.random()*4, h:1+Math.random()*2});
let groundOff=0;

/* ── 粒子 ── */
let particles=[];

/* ── 武松立绘位置 ── */
let wusongX = LEVEL_WUSONG_START[CFG._LEVEL];

/* ── DOM ── */
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const scoreDisp=document.getElementById('score-disp');
const hiDisp=document.getElementById('hi-disp');
const distDisp=document.getElementById('dist-disp');
const hpBar=document.getElementById('hp-bar');

/* ── 输入 ── */
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handleJump();}
  if(e.code==='ArrowDown'){e.preventDefault();startDuck();}
});
document.addEventListener('keyup',e=>{if(e.code==='ArrowDown')stopDuck();});
canvas.addEventListener('click',()=>handleTap());
canvas.addEventListener('touchstart',e=>{e.preventDefault();handleTap();},{passive:false});
document.getElementById('wrap').addEventListener('click',()=>{
  if(state==='idle'||state==='gameover') startGame();
});

function mobileAction(type,down){
  if(type==='jump') handleJump();
  if(type==='duck'){if(down)startDuck();else stopDuck();}
}

function handleTap(){
  if(state==='idle'||state==='gameover'){startGame();return;}
  handleJump();
}

function handleJump(){
  if(state!=='playing'||player.dead)return;
  if(player.grounded){
    player.vy=CFG.JUMP_F;player.grounded=false;
    player.jumping=true;player.jumps=1;player.ducking=false;
    player.h=100;
  } else if(player.jumps===1){
    // 二段跳
    player.vy=CFG.JUMP_F2;player.jumps=2;
    spawnParticles(player.x+player.w/2, player.y-player.h/2, '#f5c842', 8);
  }
}
function startDuck(){
  if(state!=='playing'||player.dead)return;
  player.ducking=true;
  if(player.grounded){player.h=62;player.y=CFG.GROUND;}
}
function stopDuck(){
  player.ducking=false;
  if(player.grounded){player.h=100;player.y=CFG.GROUND;}
}

/* ── 启动游戏 ── */
function startGame(){
  state='playing';speed=CFG.SPEED0;score=0;distance=0;frameN=0;winTriggered=false;
  hp=CFG.HP_MAX;invincible=0;
  obstacles=[];nextObsTimer=80;particles=[];
  wusongX = LEVEL_WUSONG_START[CFG._LEVEL];
  Object.assign(player,{y:CFG.GROUND,vy:0,grounded:true,jumping:false,jumps:0,ducking:false,dead:false,h:100,hitTimer:0});
  overlay.classList.add('hidden');
  updateHP();
  loop();
}

/* ── 游戏结束 ── */
function gameOver(){
  state='gameover';
  if(score>hiScore){hiScore=score;try{localStorage.setItem('wsdhHi',hiScore)}catch(e){}}
  const li=LEVEL_INFO[CFG._LEVEL]||LEVEL_INFO[1];
  overlay.classList.remove('hidden');
  overlay.innerHTML=`
    <div class="ov-title" style="color:#ff6644">💀 英雄落败</div>
    <div class="ov-sub">${li.sub} · ${li.title}</div>
    <div class="ov-score">得分：${score}</div>
    <div class="ov-score">最高：${hiScore}</div>
    <div class="ov-score" style="font-size:16px;color:rgba(245,200,66,.55)">本关目标：${CFG._WIN} 分</div>
    <div class="ov-hint">按 空格 / 点击 重来</div>
  `;
}

/* ── 生成障碍物 ── */
function spawnObstacle(){
  const type = Math.random();
  const s = LEVEL_TIGER_SCALE[CFG._LEVEL];
  const tw = imgs.tiger.naturalWidth * s;
  const th = imgs.tiger.naturalHeight * s;
  let obs;

  if(type < 0.35){
    obs={type:'tiger_low', x:CFG.W+20, y:CFG.GROUND,
         w:tw, h:th, speed:0};
  } else if(type < 0.60){
    obs={type:'tiger_fast', x:CFG.W+20, y:CFG.GROUND,
         w:tw, h:th, speed:1.5};
  } else if(type < 0.80){
    obs={type:'tiger_fly', x:CFG.W+20,
         y:CFG.GROUND-80,
         w:tw*0.85, h:th*0.85, speed:0};
  } else {
    obs={type:'tiger_double', x:CFG.W+20, y:CFG.GROUND,
         w:tw, h:th, speed:0, x2:CFG.W+20+tw+20};
  }
  obstacles.push(obs);
}

/* ── 粒子 ── */
function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const v=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-2,
      life:1, decay:0.04+Math.random()*0.04, color, r:3+Math.random()*4});
  }
}

/* ── 受伤 ── */
function takeDamage(){
  if(invincible>0)return;
  hp--;updateHP();
  invincible=80; // 80帧无敌
  player.hitTimer=15;
  spawnParticles(player.x+player.w/2, player.y-player.h/2, '#ff4422', 12);
  if(hp<=0){player.dead=true;setTimeout(()=>gameOver(),800);}
}

function updateHP(){
  hpBar.style.width=(hp/CFG.HP_MAX*100)+'%';
  hpBar.style.background=hp<=1?'#ff2200':hp<=2?'#ff6600':'linear-gradient(90deg,#ff4422,#ff8844)';
}

/* ── 更新 ── */
function update(){
  frameN++;
  speed=Math.min(CFG.MAX_SPEED, speed+CFG.SPD_INC);
  if(frameN%2===0) score++;
  if(CFG._WIN && score >= CFG._WIN && !winTriggered){ winTriggered=true; triggerWin(); return; }
  distance=Math.floor(frameN*speed/60);

  // 动画帧
  animT++;
  if(animT>8){animT=0;animF=1-animF;}

  // 无敌帧
  if(invincible>0)invincible--;
  if(player.hitTimer>0)player.hitTimer--;

  // 地面偏移
  groundOff=(groundOff+speed)%20;

  // 武松位置（缓慢向左走，循环）
  wusongX-=0.3;
  if(wusongX<-120)wusongX=CFG.W+20;

  // 玩家物理
  if(!player.dead){
    if(!player.grounded){
      player.vy+=CFG.GRAVITY;
      if(player.ducking) player.vy+=CFG.GRAVITY*0.8; // 蹲着下落更快
      player.y+=player.vy;
      if(player.y>=CFG.GROUND){
        player.y=CFG.GROUND;player.vy=0;
        player.grounded=true;player.jumping=false;player.jumps=0;
        if(player.ducking){player.h=62;}else{player.h=100;}
      }
    }
  }

  // 障碍物生成
  nextObsTimer-=speed/CFG.SPEED0;
  if(nextObsTimer<=0&&!player.dead){
    const last=obstacles[obstacles.length-1];
    if(!last||last.x<CFG.W-200){
      spawnObstacle();
    }
    const gap=140+Math.random()*180;
    nextObsTimer=gap*(CFG.SPEED0/speed);
  }

  // 更新障碍物
  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i];
    o.x-=speed+o.speed;
    if(o.type==='tiger_double')o.x2-=speed+o.speed;
    if(o.x<-200)obstacles.splice(i,1);
  }

  // 碰撞检测
  if(!player.dead && invincible<=0){
    const px=player.x+8, py=player.y-player.h+8;
    const pw=player.w-16, ph=player.h-12;
    for(const o of obstacles){
      const hitBoxes=[];
      if(o.type==='tiger_double'){
        hitBoxes.push({x:o.x+6,y:o.y-o.h+6,w:o.w-12,h:o.h-8});
        hitBoxes.push({x:o.x2+6,y:o.y-o.h+6,w:o.w-12,h:o.h-8});
      } else {
        hitBoxes.push({x:o.x+8,y:o.y-o.h+6,w:o.w-14,h:o.h-10});
      }
      for(const hb of hitBoxes){
        if(px<hb.x+hb.w&&px+pw>hb.x&&py<hb.y+hb.h&&py+ph>hb.y){
          takeDamage();
          break;
        }
      }
    }
  }

  // 粒子
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;
    p.life-=p.decay;p.r*=0.97;
    if(p.life<=0)particles.splice(i,1);
  }

  // 分数更新
  scoreDisp.textContent=String(score).padStart(5,'0');
  if(hiScore>0)hiDisp.textContent='HI '+String(hiScore).padStart(5,'0');
  distDisp.textContent=`${distance}m`;
}

/* ── 绘制 ── */
function draw(){
  ctx.clearRect(0,0,CFG.W,CFG.H);

  // 背景渐变天空（牛皮纸色调）
  const sky=ctx.createLinearGradient(0,0,0,CFG.H);
  sky.addColorStop(0,'#e8c88a');
  sky.addColorStop(0.5,'#d4a860');
  sky.addColorStop(1,'#b88440');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,CFG.W,CFG.H);

  // 纸纹叠加
  ctx.fillStyle='rgba(0,0,0,0.04)';
  for(let y=0;y<CFG.H;y+=6){ctx.fillRect(0,y,CFG.W,1);}

  // 远山（深色剪影）
  drawMountains();

  // 武松立绘（背景层）
  if(!player.dead || frameN%4<2){
    const wi=imgs.wusong;
    ctx.globalAlpha=0.22;
    ctx.drawImage(wi, wusongX-wi.naturalWidth/2, CFG.GROUND-wi.naturalHeight, wi.naturalWidth, wi.naturalHeight);
    ctx.globalAlpha=1;
    // 武松名标签（背景立绘上方，全不透明）
    const wName=LEVEL_NAMES[CFG._LEVEL].wusong;
    const wFs=Math.max(24,wi.naturalHeight*0.09);
    ctx.save();
    ctx.font=`bold ${wFs}px "KaiTi","STKaiti","FangSong",serif`;
    ctx.fillStyle='#d4af37';
    ctx.textAlign='center';
    ctx.textBaseline='bottom';
    ctx.shadowColor='rgba(0,0,0,0.7)';
    ctx.shadowBlur=4;
    ctx.fillText(wName,wusongX+LEVEL_WUSONG_NAME_OX[CFG._LEVEL],CFG.GROUND-wi.naturalHeight-8);
    ctx.restore();
  }

  // 地面
  drawGround();

  // 障碍物（老虎）
  drawObstacles();

  // 粒子
  drawParticles();

  // 玩家（云白侠）
  drawPlayer();

  // 速度粒子线（视觉速度感）
  if(speed>8){
    ctx.strokeStyle=`rgba(180,130,50,${(speed-8)/12})`;
    ctx.lineWidth=1;
    for(let i=0;i<5;i++){
      const lx=Math.random()*CFG.W;
      const ly=50+Math.random()*200;
      const lw=20+Math.random()*40;
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx-lw,ly);ctx.stroke();
    }
  }
}

function drawMountains(){
  // 保留旧函数名，内部按关卡分发
  drawScene();
}

function drawScene(){
  const G=CFG.GROUND, lv=CFG._LEVEL;
  if(lv===1) drawL1_PineForest(G);
  else if(lv===2) drawL2_Hills(G);
  else drawL3_Mansion(G);
}

/* ── L1 松水林 ── */
function drawL1_PineForest(G){
  // 水面
  ctx.fillStyle='rgba(110,140,165,0.13)';
  ctx.beginPath();
  ctx.moveTo(0,G-40);
  for(let x=0;x<=CFG.W;x+=15){
    ctx.lineTo(x,G-48+Math.sin(x*0.04+frameN*0.01)*4);
  }
  ctx.lineTo(CFG.W,G-40);
  ctx.closePath();ctx.fill();

  // 水面细波
  ctx.strokeStyle='rgba(130,160,180,0.12)';
  ctx.lineWidth=1;
  for(let r=0;r<3;r++){
    ctx.beginPath();
    for(let x=0;x<=CFG.W;x+=8){
      const wy=G-52+r*6+Math.sin(x*0.06+r*2+frameN*0.015)*2;
      x===0?ctx.moveTo(x,wy):ctx.lineTo(x,wy);
    }
    ctx.stroke();
  }

  // 松树剪影
  ctx.fillStyle='rgba(75,55,28,0.28)';
  const trees=[{x:30,h:100},{x:85,h:130},{x:140,h:85},{x:200,h:145},{x:255,h:95},{x:310,h:125},{x:360,h:80}];
  for(const t of trees){
    const by=G-42, ty=by-t.h, hw=t.h*0.32;
    // 外层三角
    ctx.beginPath();
    ctx.moveTo(t.x,ty);
    ctx.lineTo(t.x-hw,by);
    ctx.lineTo(t.x+hw,by);
    ctx.closePath();ctx.fill();
    // 内层三角（层次感）
    ctx.fillStyle='rgba(65,45,22,0.20)';
    ctx.beginPath();
    ctx.moveTo(t.x,ty+t.h*0.12);
    ctx.lineTo(t.x-hw*0.7,by);
    ctx.lineTo(t.x+hw*0.7,by);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(75,55,28,0.28)';
  }

  // 草丛
  ctx.fillStyle='rgba(60,80,35,0.18)';
  for(let i=0;i<12;i++){
    const bx=i*35+10, bh=8+Math.random()*14;
    ctx.beginPath();
    ctx.moveTo(bx,G-40);
    ctx.lineTo(bx-5,G-40-bh);
    ctx.lineTo(bx-2,G-40-bh*0.5);
    ctx.lineTo(bx+3,G-40-bh*0.8);
    ctx.lineTo(bx+6,G-40);
    ctx.closePath();ctx.fill();
  }
}

/* ── L2 远山微丰富 ── */
function drawL2_Hills(G){
  // 远山（原版）
  ctx.fillStyle='rgba(120,80,30,0.25)';
  ctx.beginPath();
  ctx.moveTo(0,G-40);
  const pts=[[39,G-110],[78,G-60],[127,G-130],[176,G-70],
             [220,G-145],[273,G-80],[322,G-120],[371,G-65],[390,G-45]];
  pts.forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.lineTo(CFG.W,G);ctx.lineTo(0,G);
  ctx.closePath();ctx.fill();

  // 淡云
  ctx.fillStyle='rgba(200,180,150,0.10)';
  [60,200,320].forEach(cx=>{
    ctx.beginPath();
    ctx.ellipse(cx,G-200,50+Math.sin(cx)*10,14,0,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx+25,G-208,35,10,0,0,Math.PI*2);
    ctx.fill();
  });

  // 远景灌木
  ctx.fillStyle='rgba(80,60,30,0.16)';
  [50,130,250,340].forEach(bx=>{
    ctx.beginPath();
    ctx.ellipse(bx,G-42,18+Math.sin(bx)*5,10,0,Math.PI,0);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(bx+14,G-44,14,8,0,Math.PI,0);
    ctx.fill();
  });
}

/* ── L3 古代宅院 ── */
function drawL3_Mansion(G){
  const baseY=G-42;
  const lanternY=baseY-100; // 灯笼线 = 墙体顶部

  // 院墙
  ctx.fillStyle='rgba(75,50,28,0.28)';
  ctx.fillRect(0,lanternY,CFG.W,100);
  // 墙檐线
  ctx.fillStyle='rgba(60,38,18,0.32)';
  ctx.fillRect(0,lanternY-4,CFG.W,6);

  // 唯一大三角形屋顶 —— 底部贴灯笼线，从左到右全宽
  ctx.fillStyle='rgba(70,42,20,0.32)';
  ctx.beginPath();
  ctx.moveTo(0,lanternY);
  ctx.lineTo(CFG.W/2,baseY-220);
  ctx.lineTo(CFG.W,lanternY);
  ctx.closePath();ctx.fill();

  // 中央主厅
  const cx=195;
  ctx.fillStyle='rgba(85,58,32,0.22)';
  ctx.fillRect(cx-62,lanternY,124,100);
  // 柱子
  ctx.fillStyle='rgba(65,40,20,0.30)';
  [cx-48,cx-10,cx+28].forEach(px=>{
    ctx.fillRect(px-2,lanternY,4,100);
  });

  // 门前台阶 —— 三个细长矩形，顶部贴主厅底部
  ctx.fillStyle='rgba(75,50,28,0.20)';
  for(let s=0;s<3;s++){
    ctx.fillRect(cx-30+s*6,baseY+s*6,60-s*12,7);
  }

  // 左侧房屋 —— 和主厅一样高（顶部齐平灯笼线）
  ctx.fillStyle='rgba(85,58,32,0.20)';
  ctx.fillRect(16,lanternY,58,100);

  // 灯笼
  ctx.fillStyle='rgba(190,45,25,0.55)';
  [cx-56,cx+44,48,310].forEach(lx=>{    ctx.beginPath();
    ctx.arc(lx,lanternY,5,0,Math.PI*2);
    ctx.fill();
  });
  // 灯笼绳
  ctx.strokeStyle='rgba(60,38,18,0.20)';
  ctx.lineWidth=1;
  [cx-56,cx+44,48,310].forEach(lx=>{    ctx.beginPath();
    ctx.moveTo(lx,lanternY);
    ctx.lineTo(lx,lanternY-14);
    ctx.stroke();
  });
}

function drawPagodaRoof(x,topY,w,color,ridgeColor){
  const h=38;
  // 屋顶主体剪影
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(x-w*0.08,topY+h);
  ctx.quadraticCurveTo(x-w*0.58,topY+h-2,x-w*0.72,topY+5);
  ctx.lineTo(x,topY);
  ctx.lineTo(x+w*0.72,topY+5);
  ctx.quadraticCurveTo(x+w*0.58,topY+h-2,x+w*0.08,topY+h);
  ctx.closePath();ctx.fill();
  // 屋脊横线
  ctx.strokeStyle=ridgeColor||'rgba(50,30,12,0.35)';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(x-w*0.65,topY+5);
  ctx.lineTo(x+w*0.65,topY+5);
  ctx.stroke();
  // 底部瓦当线
  ctx.strokeStyle='rgba(55,35,15,0.25)';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(x-w*0.08,topY+h-2);
  ctx.lineTo(x+w*0.08,topY+h-2);
  ctx.stroke();
}

function drawGround(){
  // 地面主色
  ctx.fillStyle='#8a5820';
  ctx.fillRect(0,CFG.GROUND+2,CFG.W,CFG.H-CFG.GROUND-2);

  // 地平线
  ctx.fillStyle='#5a3408';
  ctx.fillRect(0,CFG.GROUND,CFG.W,4);

  // 地面顶部草地带
  ctx.fillStyle='#6a8830';
  ctx.fillRect(0,CFG.GROUND-2,CFG.W,5);

  // 地面砾石纹
  ctx.fillStyle='rgba(50,25,5,0.35)';
  groundPebbles.forEach(g=>{
    const bx=((g.x-groundOff)%(CFG.W+100));
    const dx=bx<0?bx+CFG.W+100:bx;
    ctx.fillRect(dx,CFG.GROUND+6,g.w,g.h);
  });
}

function drawObstacles(){
  const tigerName=LEVEL_NAMES[CFG._LEVEL].tiger;
  for(const o of obstacles){
    const ti=imgs.tiger;
    const bob=Math.sin(frameN*0.18)*3;
    if(o.type==='tiger_double'){
      ctx.drawImage(ti,o.x,o.y-o.h+bob,o.w,o.h);
      drawTigerName(tigerName,o.x+o.w/2,o.y-o.h+bob,o.h);
      ctx.drawImage(ti,o.x2,o.y-o.h+bob,o.w,o.h);
      drawTigerName(tigerName,o.x2+o.w/2,o.y-o.h+bob,o.h);
    } else if(o.type==='tiger_fly'){
      const grd=ctx.createRadialGradient(o.x+o.w/2,o.y-o.h/2,0,o.x+o.w/2,o.y-o.h/2,50);
      grd.addColorStop(0,'rgba(255,160,0,0.3)');grd.addColorStop(1,'rgba(255,160,0,0)');
      ctx.fillStyle=grd;ctx.fillRect(o.x-20,o.y-o.h-20,o.w+40,o.h+40);
      ctx.drawImage(ti,o.x,o.y-o.h+bob,o.w,o.h);
      drawTigerName(tigerName,o.x+o.w/2,o.y-o.h+bob,o.h);
    } else {
      ctx.drawImage(ti,o.x,o.y-o.h+bob,o.w,o.h);
      drawTigerName(tigerName,o.x+o.w/2,o.y-o.h+bob,o.h);
    }
  }
}

function drawTigerName(name,cx,top,h){
  const fs=Math.max(12,h*0.14);
  ctx.save();
  ctx.font=`bold ${fs}px "KaiTi","STKaiti","SimSun",serif`;
  ctx.fillStyle='#8b2500';
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  ctx.shadowColor='rgba(0,0,0,0.5)';
  ctx.shadowBlur=2;
  ctx.fillText(name,cx,top-6);
  ctx.restore();
}

function drawPlayer(){
  const d=player;
  if(player.dead&&frameN%6<3)return;

  if(invincible>0&&invincible%8<4)return;

  let img;
  if(d.ducking&&d.grounded) img=imgs.yb_duck;
  else if(!d.grounded)       img=imgs.yb_jump;
  else                       img=imgs.yb_run;

  const drawH=d.h, drawW=img.naturalWidth*(drawH/img.naturalHeight);
  const dx=d.x, dy=d.y-drawH;

  if(d.hitTimer>0){
    ctx.globalCompositeOperation='source-over';
    ctx.shadowColor='#ff2200';ctx.shadowBlur=20;
  }

  const isRunning=d.grounded&&!d.ducking;

  if(!isRunning){
    ctx.drawImage(img, dx, dy, drawW, drawH);
  } else {
    // 跑步：上半身 75% + 单腿交替摆动
    const bodyRatio=0.75;
    const bodyH=drawH*bodyRatio;
    const legLen=drawH-bodyH;
    const hipY=dy+bodyH;
    const legDw=drawW*0.38;
    const srcH=img.naturalHeight;
    const srcW=img.naturalWidth;
    const legSrcY=srcH*0.75;
    const legSrcH=srcH*0.25;
    const raw=Math.sin(frameN*0.25);
    const leftAngle=raw>0?raw*0.4:0;
    const rightAngle=raw<0?-raw*0.4:0;

    // 上半身
    ctx.save();
    ctx.beginPath();
    ctx.rect(dx, dy, drawW, bodyH);
    ctx.clip();
    ctx.drawImage(img, dx, dy, drawW, drawH);
    ctx.restore();

    // 左腿
    ctx.save();
    ctx.translate(dx+drawW*0.3, hipY);
    ctx.rotate(leftAngle);
    ctx.drawImage(img, 0, legSrcY, srcW*0.45, legSrcH,
                  -legDw/2, 0, legDw, legLen);
    ctx.restore();

    // 右腿
    ctx.save();
    ctx.translate(dx+drawW*0.7, hipY);
    ctx.rotate(rightAngle);
    ctx.drawImage(img, srcW*0.55, legSrcY, srcW*0.45, legSrcH,
                  -legDw/2, 0, legDw, legLen);
    ctx.restore();
  }

  ctx.shadowBlur=0;ctx.globalCompositeOperation='source-over';

  // 脚底阴影
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(dx+drawW/2, d.y+2, drawW/2*0.8, 5, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

/* ── 主循环 ── */
function loop(){
  if(state!=='playing')return;
  update();draw();
  requestAnimationFrame(loop);
}

/* ── 初始化 ── */
async function init(){
  const srcs = LEVEL_SRCS[CFG._LEVEL];
  [imgs.yb_run, imgs.yb_jump, imgs.yb_duck, imgs.tiger, imgs.wusong] = await Promise.all([
    loadImg(srcs.yb_run),loadImg(srcs.yb_jump),loadImg(srcs.yb_duck),
    loadImg(srcs.tiger),loadImg(srcs.wusong),
  ]);
  hiScore=parseInt(localStorage.getItem('wsdhHi'))||0;
  // 加载第二关老虎作为尺寸基准
  const refTiger = await loadImg(LEVEL_SRCS[2].tiger);
  tigerRefW = refTiger.naturalWidth;
  tigerRefH = refTiger.naturalHeight;
  // 自动计算当前关卡缩放，使老虎显示尺寸与第二关一致
  LEVEL_TIGER_SCALE[CFG._LEVEL] = Math.min(
    tigerRefW / (imgs.tiger.naturalWidth || 1),
    tigerRefH / (imgs.tiger.naturalHeight || 1)
  );
  // 初始静帧预览
  draw();
}
init();

function triggerWin(){
  state='won';
  const cs = CUTSCENES[CFG._LEVEL] || CUTSCENES[1];
  const hasNext = CFG._LEVEL < 3;
  const fullText = cs.lines.join('\n\n');
  overlay.classList.remove('hidden');
  overlay.innerHTML=`
    <div class="ov-title" style="color:#f5c842;font-size:22px;letter-spacing:2px">⚔️ ${cs.title}</div>
    <div id="cs-body" style="font-size:13px;color:rgba(232,208,148,.9);line-height:2;
         letter-spacing:1px;max-width:300px;text-align:left;margin:14px 0;min-height:110px;
         white-space:pre-wrap"></div>
    <div id="cs-btns" style="display:none;gap:14px;justify-content:center;flex-wrap:wrap">
      ${hasNext ? `<button style="padding:12px 32px;background:#1b66c2;border:none;border-radius:28px;color:#fff;font-size:15px;font-family:inherit;letter-spacing:2px;cursor:pointer" onclick="nextLevel()">下一关 →</button>` : ''}
      <button style="padding:12px 32px;background:rgba(255,255,255,.1);border:1px solid rgba(255,200,66,.3);border-radius:28px;color:rgba(232,208,148,.8);font-size:15px;font-family:inherit;letter-spacing:2px;cursor:pointer" onclick="finishLevel()">${hasNext?'回到江湖':'大结局'}</button>
    </div>
    <div class="ov-hint" id="cs-hint" style="margin-top:8px">连击两次 跳过文字</div>
  `;
  const box=document.getElementById('cs-body');
  const lines=cs.lines; let li=0,ci=0,txt='';
  let timerId, lastTap=0;
  const finishShow = ()=>{
    if(timerId){clearInterval(timerId);timerId=null;}
    box.textContent=fullText;
    document.getElementById('cs-btns').style.display='flex';
    document.getElementById('cs-hint').style.display='none';
  };
  timerId=setInterval(()=>{
    if(li>=lines.length){finishShow();return;}
    txt+=lines[li][ci++];
    box.textContent=txt;
    if(ci>=lines[li].length){txt+='\n\n';li++;ci=0;}
  },35);

  /* 双击跳过：触屏/鼠标/空格 */
  function onSkipTap(e){
    if(e.type==='keydown'&&e.code!=='Space')return;
    e.preventDefault();
    const now=Date.now();
    if(now-lastTap<420){finishShow();}
    lastTap=now;
  }
  overlay.addEventListener('click',onSkipTap);
  overlay.addEventListener('touchstart',onSkipTap,{passive:false});
  document.addEventListener('keydown',onSkipTap);
  /* 一次性清理 */
  const cleanup=()=>{
    overlay.removeEventListener('click',onSkipTap);
    overlay.removeEventListener('touchstart',onSkipTap);
    document.removeEventListener('keydown',onSkipTap);
  };
  const obsBtn=overlay.querySelector('button');
  if(obsBtn) obsBtn.addEventListener('click',cleanup);
  /* finishShow 后也清理 */
  const origFinish=finishShow;
  finishShow=()=>{cleanup();origFinish();};
}

function nextLevel(){
  const done=JSON.parse(localStorage.getItem('shuihu_done')||'[]');
  if(!done.includes(CFG._LEVEL)) done.push(CFG._LEVEL);
  localStorage.setItem('shuihu_done',JSON.stringify(done));
  localStorage.setItem('shuihu_level', String(CFG._LEVEL+1));
  location.reload();
}

// ─── 精准替换最底部的 function goBack(){ ... } ───
function goBack(){
  let done = JSON.parse(localStorage.getItem('shuihu_done') || '[]');
  let activeLevel = 1; // 第一关

  if (!done.includes(activeLevel)) {
    done.push(activeLevel); // 盖上通关印章
  }
  
  localStorage.setItem('shuihu_done', JSON.stringify(done));
  localStorage.setItem('shuihu_return', '1'); // ⚠️ 关键：塞入返回钥匙！
  
  window.location.href='index.html'; // 回到大厅
}



function finishLevel(){
  try{
    const done=JSON.parse(localStorage.getItem('shuihu_done')||'[]');
    if(!done.includes(CFG._LEVEL)) done.push(CFG._LEVEL);
    localStorage.setItem('shuihu_done',JSON.stringify(done));
  }catch(e){}
  localStorage.setItem('shuihu_return','1');
  if(CFG._LEVEL>=3) localStorage.setItem('shuihu_ending','1');
  window.location.href='index.html';
}
